name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["site/**", "docs/**", "**/*.md"]
  pull_request:
    paths-ignore: ["site/**", "docs/**", "**/*.md"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (ruff + pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r api/requirements.txt
          # delta-store and source-runner each ship their own requirements.txt
          # (the docker images install from them). Pytest collects tests from
          # all three trees, so without these the suite can't import asyncpg /
          # source-runner producers and fails at collection time.
          pip install -r delta-store/requirements.txt
          pip install -r source-runner/requirements.txt

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

      - name: pytest
        run: pytest

  node:
    name: Node (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install devtools
        run: npm install --no-audit --no-fund

      - name: Install addon deps
        run: |
          for dir in addons/*/; do
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && npm install --no-audit --no-fund --ignore-scripts) || true
            fi
          done

      - name: eslint
        run: npm run lint

      - name: prettier --check
        run: npm run format:check
