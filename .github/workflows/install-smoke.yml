# Install smoke test
#
# Runs `addons/scripts/install.sh` against the working tree on a clean
# runner — the same path a stranger using
# `curl -fsSL https://fathomdx.io/install.sh | bash` would take.
#
# Two-platform matrix:
#   - ubuntu-latest:  full smoke. Install + start stack + assert health.
#                     This is the layer that catches "the installer broke"
#                     before a Linux user does.
#   - macos-latest:   install path only. Install Docker CLI via brew so
#                     the prereq check passes, but skip autostart (GH
#                     macOS runners don't have a docker daemon by
#                     default; spinning Colima would add ~3 minutes).
#                     Catches BSD-vs-GNU portability bugs in our scripts
#                     (sed, mktemp, bash 3.2 syntax) without needing a
#                     full container runtime.
#
# Why a separate workflow (not a third job in ci.yml):
#   - This pulls images and builds containers. It's slow (~5 min on cold
#     cache) compared to the lint+pytest jobs (~1 min). Keeping it
#     separate means PR feedback on code quality stays fast.
#   - It needs to run on a different path filter — install can break from
#     changes to docker-compose.yml, requirements.txt, the install scripts
#     themselves. ci.yml's filter ignores docs but doesn't watch for these.
#   - Nightly schedule catches base-image and external-pull regressions
#     that don't show up in PR diffs.
#
# Why LLM_PROVIDER=ollama:
#   The smoke test has no API key. We don't need a working LLM to
#   verify the stack starts — just need preflight to let it through.
#   `ollama` is the only provider that doesn't require a key.
#
# Why FATHOM_REPO=$GITHUB_WORKSPACE (cloning from local checkout):
#   We want to test THIS commit's install path, not whatever's on main.
#   install.sh's git clone happily takes a local path as FATHOM_REPO.

name: Install smoke test

on:
  push:
    branches: [main]
    paths: &install_paths
      - "addons/scripts/install.sh"
      - "addons/scripts/preflight.sh"
      - ".env.example"
      - "docker-compose.yml"
      - "**/Dockerfile"
      - "**/requirements.txt"
      - "**/package.json"
      - "QUICKSTART.md"
      - ".github/workflows/install-smoke.yml"
  pull_request:
    paths: *install_paths
  schedule:
    # Nightly — catches base-image regressions even when no install-relevant
    # source file changed. 04:17 UTC = before US morning, after EU evening.
    - cron: "17 4 * * *"

concurrency:
  # Workflow-level — `matrix.os` isn't available here, so this cancels the
  # whole matrix (both Linux + macOS) on a new push to the same ref. That's
  # what we want; we don't need per-OS concurrency.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: ${{ matrix.os }} install
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      # One platform breaking shouldn't hide the other.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Docker CLI (macOS prereq)
        if: matrix.os == 'macos-latest'
        # The Docker CLI alone (no daemon) is enough to satisfy install.sh's
        # prereq check — `docker compose version` is a client-side subcommand
        # and doesn't need a running daemon. We skip autostart below so we
        # never actually try to talk to the daemon.
        #
        # Brew's docker-compose ships as a CLI plugin under
        # $(brew --prefix)/lib/docker/cli-plugins; symlink it into
        # ~/.docker/cli-plugins so `docker compose` finds it without
        # needing a config.json entry.
        run: |
          brew install docker docker-compose
          mkdir -p ~/.docker/cli-plugins
          ln -sfn "$(brew --prefix)/lib/docker/cli-plugins/docker-compose" ~/.docker/cli-plugins/docker-compose
          docker --version
          docker compose version

      - name: Run install.sh against this commit
        env:
          NONINTERACTIVE: "1"
          # Only autostart on Linux. macOS runners have no docker daemon.
          FATHOM_AUTOSTART: ${{ matrix.os == 'ubuntu-latest' && '1' || '0' }}
          FATHOM_DIR: ${{ runner.temp }}/fathom-install
          FATHOM_REPO: ${{ github.workspace }}
          FATHOM_REF: ${{ github.sha }}
          # Bypass the API-key prompt — see header comment.
          LLM_PROVIDER: ollama
        run: ./addons/scripts/install.sh

      - name: Verify install path artifacts (both platforms)
        # These are the artifacts every successful install creates,
        # regardless of whether the stack got started. Any portability
        # bug in preflight (sed, mktemp, file ops) shows up here.
        run: |
          set -e
          INSTALL_DIR="${RUNNER_TEMP}/fathom-install"
          test -f "${INSTALL_DIR}/.env"               && echo "✓ .env present"
          test -d "${INSTALL_DIR}/addons/scripts"     && echo "✓ addons/scripts present"
          test -x "${INSTALL_DIR}/addons/scripts/preflight.sh" && echo "✓ preflight.sh executable"
          # preflight should have stamped LAKE_DIR into .env
          grep -E '^LAKE_DIR=/' "${INSTALL_DIR}/.env" && echo "✓ LAKE_DIR set to absolute path"
          grep -E '^LLM_PROVIDER=ollama' "${INSTALL_DIR}/.env" && echo "✓ LLM_PROVIDER persisted"
          # Lake subdirs created (default ~/.fathom/mind)
          for sub in deltas backups source-runner api; do
            test -d "${HOME}/.fathom/mind/${sub}" && echo "✓ ${HOME}/.fathom/mind/${sub} created"
          done

      - name: Wait for the stack to be healthy
        if: matrix.os == 'ubuntu-latest'
        working-directory: ${{ runner.temp }}/fathom-install
        run: |
          # Compose has its own healthchecks; poll the user-facing endpoints
          # so the assertion matches what an actual user would experience.
          echo "Waiting for delta-store /health..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:4246/health 2>/dev/null | grep -q '"status":"ok"'; then
              echo "  ready (${i}s)"
              break
            fi
            sleep 1
            if [ "$i" = "60" ]; then echo "delta-store never reported healthy" >&2; exit 1; fi
          done
          echo "Waiting for api /v1/stats..."
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8201/v1/stats >/dev/null 2>&1; then
              echo "  ready (${i}s)"
              break
            fi
            sleep 1
            if [ "$i" = "60" ]; then echo "api never responded on /v1/stats" >&2; exit 1; fi
          done

      - name: Assert stack returns sane responses
        if: matrix.os == 'ubuntu-latest'
        working-directory: ${{ runner.temp }}/fathom-install
        run: |
          set -euo pipefail
          # /health should be ok
          curl -fsS http://localhost:4246/health | tee /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
          # /v1/stats should be valid JSON with a delta count (zero on fresh install)
          curl -fsS http://localhost:8201/v1/stats | tee /tmp/stats.json
          python -c 'import json,sys; d=json.load(open("/tmp/stats.json")); assert isinstance(d, dict), d; print("stats OK:", d)'

      - name: Dump container logs on failure
        if: failure() && matrix.os == 'ubuntu-latest'
        working-directory: ${{ runner.temp }}/fathom-install
        run: |
          echo "=== docker compose ps ==="
          docker compose ps
          echo "=== api logs ==="
          docker compose logs --tail=200 api    || true
          echo "=== delta-store logs ==="
          docker compose logs --tail=200 delta-store || true
          echo "=== source-runner logs ==="
          docker compose logs --tail=200 source-runner || true
          echo "=== postgres logs ==="
          docker compose logs --tail=200 postgres || true

      - name: Tear down
        if: always() && matrix.os == 'ubuntu-latest'
        working-directory: ${{ runner.temp }}/fathom-install
        run: docker compose down -v
